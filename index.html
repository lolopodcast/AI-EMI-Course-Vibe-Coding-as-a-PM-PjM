m1_nav: "1. 六層架構知識庫", m1_title: "六層架構知識庫",
m1_overview: "AI-native 開發的核心，是把一個模糊的需求，逐層轉譯成 AI 能理解、能執行的規格。這一層一層的順序，決定了後面的實作品質。",
m1_highlights: ["六層架構","Graphiti雙重意涵","三種記憶能力對照","疊代關係"],
m1_p1: "六層架構分別回答六個問題：Customer Needs 回答「為什麼要做」；Product Goals 回答「要達成什麼結果」；Open Spec 回答「系統必須做什麼」；Architecture／Graphiti 回答「彼此如何連結」；Schema 回答「資料長什麼樣」；最後 AI Coding 才是動手實作，回答「誰把它寫出來」。濃縮成一句話：Spec 決定做什麼，Graphiti 決定怎麼組裝，Schema 決定資料長怎樣，AI Agent 負責把它寫出來。",
m1_p2: "Graphiti 這個詞同時指兩件事：通用概念——描述系統裡各物件如何連結的關聯圖；以及特定工具——getzep/graphiti 這類具時間感知的知識圖譜開發套件。在 AI-native 系統裡，這兩者常常疊合在一起。",
m1_p3: "更重要的是，Graphiti 與 Schema 不是單純的上下層關係，而是互相疊代、來回修正：畫架構時可能發現某個關聯需要特定欄位才能成立，設計 Schema 時也可能暗示了一條原本沒畫出來的關聯。對非技術背景的學員，也可以用更友善的說法理解：Graphiti 像是畫一張家族族譜，Schema 像是設計一張成績單的欄位。",
m1_p4: "如果想更深入理解 Graphiti 這個工具，可以對照三種不同的記憶能力：向量資料庫知道哪些東西「像」；圖資料庫知道哪些東西「有關」；Graphiti 兩者都知道，還多記住「什麼時候變的」。它的核心元素包括節點（Nodes）、連結線（Edges）、相似性（Similarity）、以及脈絡與時間（Context & Temporal Evolution）。",
m1_wrapup: "六層架構不是新的技術規範，而是一套讓老師在完全不寫程式的情況下，也能清楚定義一個數位產品的思考順序。掌握這六層，才能在後面的工作坊裡，真正跟 AI 溝通清楚。",

m2_nav: "2. 工作坊架構設計", m2_title: "工作坊架構設計",
m2_overview: "把六層架構轉譯成一場真正可以開課的工作坊：基礎模組六小時，實施模組六小時，教會沒有程式背景的老師自兼 PM/PjM。",
m2_highlights: ["基礎模組6HR","實施模組6HR","角色轉換","3HR快速精華版"],
m2_p1: "工作坊分成兩個各六小時的模組。基礎模組完全不需要碰任何 AI 工具，專注在把教學想法一層一層轉譯成清楚的規格，同時導入 Agile 專案管理的必要概念。實施模組才正式開始動手，用 Claude Code 把規格變成真正能運作的原型，並學會多重代理人協作與交接文件撰寫。兩模組可以連續開課，也可以各自獨立排課。",
m2_p2: "角色會整個轉換：老師兼任 Product Manager（定義要做什麼）與 Project Manager（安排誰、何時做）；TA 或協作教師扮演 Vibe Coder，實際跟 Claude Code 對話產出程式碼；Claude Code 則是 Implementer，依照交接文件把規格變成可運作的產品，必要時分派多個子代理人並行處理。",
m2_p3: "基礎模組六個 Session：開場與六層架構總覽、Needs→Goals、Open Spec、Graphiti+Schema、Agile 必要概念、收尾整理成基礎規格包。實施模組六個 Session：Claude Code 入門、Vibe Coding 實作、多重代理人協作、交接文件撰寫、角色互換交接演練、成果展示與回顧會。",
m2_p4: "如果時間有限，也設計了快速精華版：基礎模組三小時＋實施模組三小時，一樣可以完整走過六層架構，適合時間有限的場次。",
m2_wrapup: "這套工作坊的設計邏輯，是讓整套課程結構本身，就是六層架構的一次完整示範——先定義、再組裝、最後才動手，教材本身就是教學內容的證明。",

m3_nav: "3. Agile / PjM 必要概念", m3_title: "Agile / PjM 必要概念",
m3_overview: "規格寫完，不代表專案會自己跑下去。這一節把 Backlog、看板、衝刺、完成的定義、同步會、回顧會、MVP 這些概念，對應到六層架構上。",
m3_highlights: ["Backlog","看板Kanban","衝刺Sprint","完成的定義","同步會","回顧會","MVP"],
m3_p1: "Backlog 是所有還沒做、但已經想到的事的清單，不分先後，先收集再排序。看板則是把 Backlog 裡的項目，依「待做／進行中／已完成」三欄追蹤進度——如果「進行中」欄位一次塞了太多張卡，代表同時做太多事，反而每件事都做不完。",
m3_p2: "衝刺是固定一段時間只專注做完一批工作，時間到就檢視、調整，再開始下一輪。切割衝刺時要注意任務的相依關係——例如報表功能一定要等問答資料格式確定後才能開始，不能只照便利貼順序硬做。",
m3_p3: "「完成的定義」是最容易被忽略的地雷：同一句「做完了」，老師跟 TA 可能認定完全不同的標準。每一條使用者故事都應該先講清楚「怎樣才算做完」，而不是等做完才發現不符預期。",
m3_p4: "同步會不是開會報告，是花 3-5 分鐘快速同步「上次做了什麼、接下來要做什麼、卡在哪裡」。回顧會則是一輪工作結束後，用 Keep／Problem／Try 三欄檢討流程，重點是檢討流程而不是檢討人。最小可行產品（MVP）則提醒團隊：先求有能動的版本，再求好，不要一次追求完美。",
m3_wrapup: "這些概念不是額外的知識，而是讓六層架構能被一個團隊持續執行下去的操作介面——沒有看板、沒有衝刺，規格寫得再清楚，團隊還是會亂。",
m3_terms: [
  { front:"Backlog", back:"所有還沒做、但已經想到的功能清單，先收集不分先後" },
  { front:"看板 Kanban", back:"待做／進行中／已完成三欄，用來追蹤工作進度的視覺化工具" },
  { front:"衝刺 Sprint", back:"固定一段時間只專注做完一批工作，時間到就檢視調整" },
  { front:"完成的定義 DoD", back:"一項工作要滿足什麼條件才算做完，避免各自認定標準不一" },
  { front:"同步會 Standup", back:"3-5分鐘快速同步進度與卡點，不是逐項報告" },
  { front:"回顧會 Retrospective", back:"用 Keep/Problem/Try 三欄檢討流程，而非檢討人" },
  { front:"MVP", back:"最小可行產品，先求有能運作的版本，再求好" }
],
m3_q: [
  { q:"Backlog的核心精神是？", opts:["只收集重要的項目","收集所有想到的事，不分先後","必須馬上排出優先順序","只能由老師新增"], ans:_A1, exp:"Backlog先全部收集，排優先順序是下一步的事。" },
  { q:"看板「進行中」欄位塞太多卡片，代表什麼？", opts:["進度很快","同時做太多事，反而做不完","需要增加更多欄位","應該取消看板"], ans:_A1, exp:"同時進行太多工作，反而每件事都做不完。" },
  { q:"切割衝刺時最容易被忽略的是？", opts:["任務的相依關係","便利貼的顏色","開會的時間","團隊人數"], ans:_A0, exp:"忽略相依關係，容易導致排序錯誤、需要重工。" },
  { q:"完成的定義主要用來解決什麼問題？", opts:["工具選擇問題","不同人對「做完」認定不一致","誰負責寫程式","要不要用AI"], ans:_A1, exp:"完成的定義統一「做完」的判斷標準。" },
  { q:"回顧會的重點原則是？", opts:["檢討做得不好的人","檢討流程而非檢討人","只在專案失敗時才辦","由AI自動產生報告"], ans:_A1, exp:"回顧會的核心精神是檢討流程，不是檢討人。" },
  { q:"MVP的精神最接近下列哪一句話？", opts:["一次做到完美再上線","先求有能動的版本，再求好","先做行銷，再做產品","先招募團隊，再定義規格"], ans:_A1, exp:"MVP講求先求有、再求好，不追求一次到位。" }
],

m4_nav: "4. EMI案例：Vibe Coding實作", m4_title: "EMI 案例：Vibe Coding 實作",
m4_overview: "用駱世民教授的 EMI 課程「國際策略管理（SMMC）」作為真實案例，示範怎麼把完整規格包交給 Claude Code，並刻意對照「規格清楚」與「規格模糊」兩種結果的差異。",
m4_highlights: ["EMI真實案例","雙語AI助教","規格清楚vs模糊對照","Definition of Done檢查"],
m4_p1: "案例背景是駱教授的 EMI 課程，學生因為全英語授課常常跟不上，老師沒有時間逐一解惑，系所也想追蹤學生在哪些單元卡關。團隊把需求一層一層寫成規格：3條Needs、3個Goals、5條使用者故事（含完成的定義）、Graphiti關聯樹、Schema資料表，整理成一份完整的基礎規格包。",
m4_p2: "示範時會先把完整規格包貼給 Claude Code，並請它「先用三到五句話確認理解，再開始實作」——這個習慣等同於團隊裡的需求覆核，能提早抓到誤解，而不是做完才發現方向錯了。",
m4_p3: "最關鍵的教學設計，是刻意用第二次「故意模糊」的指令重跑一次，只給一句「幫我做一個課程網站，有AI可以回答學生問題」。兩次結果一比對，學生會親眼看到：雙語支援、對話紀錄、信心不足時明確告知，這些原本規格裡清楚寫出來的功能，在模糊指令下全部消失。",
m4_p4: "這個對照，直接回答了整套工作坊最核心的問題：規格的清晰度，直接決定了 AI 產出的品質。原型做完後，還要逐條核對 Definition of Done，而不是看起來「差不多」就算過關。",
m4_wrapup: "Vibe Coding 不是把工作丟給 AI 就結束，而是用清楚的規格引導 AI 做出對的東西——這正是老師身為 PM/PjM 最核心的工作。",
m4_terms: [
  { front:"雙語AI助教", back:"能用中文或英文提問，並以提問語言回覆的AI問答功能，是EMI案例的核心規格" },
  { front:"需求覆核", back:"請Claude Code先複述理解再動手實作的習慣，能提早抓到誤解" },
  { front:"規格清楚vs模糊對照", back:"用同一個專案分別跑清楚規格與模糊指令，直接比較AI產出的落差" },
  { front:"信心不足告知", back:"AI助教在超出教材範圍時，必須明確告知而非自行編造答案的規格要求" },
  { front:"Vibe Coding Log", back:"記錄實際跟Claude Code對話的過程，包含用了什麼prompt、AI誤解了什麼" }
],

m5_nav: "5. 多重代理人協作", m5_title: "多重代理人協作",
m5_overview: "當專案有好幾件事要同時做，可以用一句話請 Claude Code 派出多個子代理人平行處理——但關鍵是要先判斷哪些工作可以平行、哪些要排隊。",
m5_highlights: ["探索型/實作型/審查型","任務相依判斷","Graphiti關聯圖回頭用","審查後再修正"],
m5_p1: "案例延續EMI課程，把工作拆成三個任務：課程頁面（任務A）、雙語AI助教問答（任務B）、對話紀錄與每週報表（任務C）。任務A與B彼此獨立，可以平行處理；但任務C依賴任務B產生的對話資料格式，必須排在B之後才能開始。",
m5_p2: "判斷平行或相依的依據，其實就是先前已經畫好的 Graphiti 關聯圖——WeeklyReport 這條線本來就標明它是「依Conversation統計而成」，這條線直接告訴你任務C要排在任務B之後，不是憑空猜測。",
m5_p3: "Claude Code 支援三種分工角色：探索型代理人先讀懂專案現況；實作型代理人負責把功能做出來；審查型代理人專門檢查別人做的東西有沒有問題。把「寫」與「審查」分開，能避免同一個代理人自己寫、自己審查看不出問題。",
m5_p4: "審查完後建議先列出問題清單，不要讓AI直接全部改掉，保留老師（PjM）最後的決定權。如果不管相依關係就把三個任務一起發派，常見的後果是任務C假設了一種資料格式，結果跟任務B實際產出的格式對不起來，還要重工。",
m5_wrapup: "多重代理人不是拆得越多越快，而是要先判斷「真的獨立」且「量體夠大」才值得拆——這個判斷力，比操作方法本身更重要。",
m5_terms: [
  { front:"探索型代理人", back:"先去讀懂整個專案現況、找資料在哪裡的子代理人角色" },
  { front:"實作型代理人", back:"專門負責把某個功能實際做出來的子代理人角色" },
  { front:"審查型代理人", back:"專門檢查另一個代理人寫出來的東西有沒有問題，避免自己寫自己審查" },
  { front:"任務相依關係", back:"某個任務的產出是另一個任務的輸入，必須排序執行，不能盲目平行" },
  { front:"Graphiti關聯圖的延伸用途", back:"不只是設計資料的工具，也能拿來判斷哪些工作可以平行、哪些要排隊" }
],
m5_q: [
  { q:"案例中，任務C（報表）為什麼不能跟任務A、B同時平行處理？", opts:["因為報表比較簡單","因為它依賴任務B產生的對話資料格式","因為老師比較忙","因為Claude Code一次只能做一件事"], ans:_A1, exp:"任務C依賴任務B的資料格式，必須排在其後。" },
  { q:"判斷哪些任務要排隊、哪些可以平行，最直接的依據是？", opts:["便利貼的顏色","已經畫好的Graphiti關聯圖","團隊人數多寡","專案預算"], ans:_A1, exp:"Graphiti關聯圖裡的依賴線，直接指出排序依據。" },
  { q:"把「寫」與「審查」分開交給不同代理人，主要是為了避免什麼？", opts:["浪費運算資源","自己寫自己審查看不出問題","增加等待時間","降低程式碼品質"], ans:_A1, exp:"分開角色能避免自己寫、自己審查的盲點。" },

m6_nav: "6. 交接文件與評量機制", m6_title: "交接文件與評量機制",
m6_overview: "一份好的交接文件，要讓TA或協作教師完全不能問你，也能獨立接手。這一節整合交接文件範本的十個章節，以及整套工作坊的學習成效評量與回饋機制設計。",
m6_highlights: ["交接文件十節","同儕實測","結業標準","課後回饋問卷"],
m6_p1: "交接文件範本包含十個章節：專案基本資訊、Customer Needs、Product Goals、Open Spec、Graphiti、Schema、Vibe Coding Log、目前完成度、給接手者的下一步建議、聯絡窗口與同步節奏。填寫原則是假設接手的人完全沒有機會問你，文件必須自己說清楚一切。",
m6_p2: "整套工作坊最關鍵的檢核點，是交接文件的「同儕實測」——讓另一組完全沒參與過程的人，只憑這份文件，實際延伸出至少一個新功能。如果對方看不懂，代表這位學員還沒有真正掌握「寫出可獨立使用的交接文件」這個學習目標。",
m6_p3: "結業標準要求三項產出物：一份完整的基礎規格包、一個可運作的原型加上Vibe Coding Log、以及一份通過同儕實測的交接文件。課後回饋問卷則包含學習成效自評（前測/後測對照）、內容與節奏評分、講師與教材評價、以及後續應用意願四大部分。",
m6_p4: "建議額外搭配30天後的簡短追蹤：學員是否已經開始把這套流程套用在自己的專案上、走到六層架構的哪一層、卡在哪裡。這比課堂當下的滿意度分數，更能驗證教材是否真的教會人。",
m6_wrapup: "交接文件與評量機制，回過頭來呼應了整套架構最核心的精神：規格與文件必須自足，好不好用，由「不知情的第三者」說了算，而不是自己說了算。",
m6_terms: [
  { front:"同儕實測", back:"讓另一組完全沒參與過程的人只憑交接文件接手，驗證文件是否真的自足" },
  { front:"結業標準", back:"完成基礎規格包、可運作原型+Log、通過同儕實測的交接文件，三項缺一不可" },
  { front:"前測/後測自評", back:"課後問卷請學員針對五項學習目標，回想工作坊前後的信心值變化" },
  { front:"30天追蹤", back:"結業後30天的簡短追蹤，確認學員是否真的把流程套用到實際專案" },
  { front:"Vibe Coding Log", back:"交接文件第七節，記錄與Claude Code協作的過程與分工代理人" }
],
m6_q: [
  { q:"交接文件的填寫原則，假設接手的人是什麼狀態？", opts:["可以隨時問原作者","完全沒有機會問原作者","已經參與過整個過程","是專業工程師"], ans:_A1, exp:"必須假設接手者無法詢問原作者，文件要能自足。" },
  { q:"驗證交接文件是否真的「自足」，最有效的方式是？", opts:["請老師自己重讀一遍","同儕實測——讓沒參與過的人只憑文件接手","統計文件的字數","請AI摘要文件內容"], ans:_A1, exp:"同儕實測是最直接、最有說服力的驗證方式。" },
  { q:"結業標準要求的三項產出物，不包含下列哪一項？", opts:["基礎規格包","可運作原型+Vibe Coding Log","通過同儕實測的交接文件","一份正式的期末書面測驗"], ans:_A3, exp:"結業標準採產出物驗收，不是書面測驗。" },
  { q:"課後回饋問卷的Part A，主要在評量什麼？", opts:["講師的外表","學員對五項學習目標的前測/後測信心值","教室的座位安排","餐飲滿意度"], ans:_A1, exp:"Part A是學習成效自評，前測/後測信心值對照。" },
  { q:"為什麼建議做30天後的追蹤，而不是只看課堂當下的問卷？", opts:["因為30天後比較好聯絡","更能驗證教材是否真的教會人、學員是否實際應用","因為法規要求","純粹增加工作量"], ans:_A1, exp:"長期追蹤比課堂滿意度分數更能驗證實際成效。" }
],

m0_nav: "0. Executive Summary",
m0_title: "AI-native Product Development Workshop Package",
m0_intro: "This is a complete AI-native product development workshop package designed for university faculty with zero coding background. The core claim: what AI really transforms isn't whether to use it, but the entire process of building a digital product. The material breaks this process into six layers — Customer Needs, Product Goals, Open Spec, Architecture/Graphiti, Schema, AI Coding — and translates it into a workshop with a 6-hour Foundations module and a 6-hour Implementation module, teaching instructors to act as both product manager and project manager, using Claude Code to turn teaching ideas into working digital tools, alongside essential Agile concepts so a small team can keep the process running. Throughout, it uses Professor Shihmin Lo's (NCNU) EMI course, Strategic Management of Multinational Corporations (SMMC), as a running case, demonstrating the full flow from spec writing, multi-agent collaboration, and handoff documents, to outcome assessment.",
m0_why: "Why do instructors need this approach?",
m0_why_desc: "In the past, instructors wanting a digital course product could only rely on engineers or vendors — high communication cost, long waits. This workshop lets instructors directly own the skill of defining the problem, handing the hands-on building to AI, drastically shortening the distance from idea to usable product.",
m0_modules: [
  { num: "01", title: "Six-Layer Knowledge Base", desc: "Core AI-native concepts: Needs, Goals, Spec, Graphiti, Schema, AI Coding" },
  { num: "02", title: "Workshop Structure Design", desc: "6-hour Foundations + 6-hour Implementation, role shift and course overview" },
  { num: "03", title: "Essential Agile / PjM Concepts", desc: "Backlog, Kanban, Sprint, Definition of Done, Standup, Retrospective, MVP" },
  { num: "04", title: "EMI Case: Vibe Coding in Action", desc: "Turning a spec into a working prototype with Claude Code, clear vs. vague comparison" },
  { num: "05", title: "Multi-Agent Collaboration", desc: "Judging parallel vs. dependent tasks, delegating to Claude Code in one sentence" },
  { num: "06", title: "Handoff Docs & Assessment", desc: "A reusable handoff template, learning-outcome rubric, and post-workshop survey" }
],

m1_nav: "1. Six-Layer Knowledge Base", m1_title: "Six-Layer Knowledge Base",
m1_overview: "The core of AI-native development is translating a vague requirement, layer by layer, into a specification AI can understand and execute. This layer order determines the quality of everything that follows.",
m1_highlights: ["Six-Layer Framework","Graphiti's Dual Meaning","Three-Tier Memory Comparison","Iteration"],
m1_p1: "The six layers each answer one question: Customer Needs answers 'why'; Product Goals answers 'what outcome'; Open Spec answers 'what the system must do'; Architecture/Graphiti answers 'how things connect'; Schema answers 'what the data looks like'; and only then does AI Coding begin, answering 'who writes it'. In one sentence: Spec decides what to build, Graphiti decides how it connects, Schema decides what the data looks like, and the AI agent writes it.",
m1_p2: "Graphiti refers to two things at once: the generic concept — a relationship diagram describing how objects in a system connect; and the specific tool — getzep/graphiti, a temporally-aware knowledge-graph development kit. In AI-native systems, these two often overlap.",
m1_p3: "More importantly, Graphiti and Schema are not a simple top-down relationship but iterate back and forth: drafting the architecture may reveal that a relationship needs a specific field to hold up, and designing the Schema may hint at a relationship that wasn't drawn yet. For non-technical learners, friendlier analogies work too: Graphiti is like drawing a family tree, Schema is like designing the columns of a grade sheet.",
m1_p4: "To understand the Graphiti tool more deeply, compare three kinds of memory: vector databases know what's 'similar'; graph databases know what's 'related'; Graphiti knows both, plus 'when things changed'. Its core elements are Nodes, Edges, Similarity, and Context & Temporal Evolution.",
m1_wrapup: "The six-layer framework isn't a new technical standard — it's a thinking order that lets an instructor clearly define a digital product without writing any code. Mastering these six layers is what makes real communication with AI possible in the rest of the workshop.",
m1_terms: [
  { front:"Open Spec", back:"A list of system behaviors written as user stories, answering 'what the system must do'" },
  { front:"Graphiti (concept)", back:"A relationship diagram describing how objects connect — a generic concept any development process needs" },
  { front:"Graphiti (tool)", back:"getzep/graphiti, a temporally-aware knowledge-graph dev kit that remembers how relationships evolve" },
  { front:"Schema", back:"A data spec sheet defining what fields each object has and what the data looks like" },
  { front:"Iteration (Graphiti↔Schema)", back:"The relationship diagram and data spec revise each other back and forth, not a one-shot linear step" },
  { front:"Vector Database", back:"Knows what's 'similar', good at answering conceptual-similarity questions" }
],
m1_q: [
  { q:"Which question does Open Spec primarily answer?", opts:["Why build it","What outcome to achieve","What the system must do","What the data looks like"], ans:_A2, exp:"Open Spec answers 'what the system must do', written as user stories." },
  { q:"Which two meanings does Graphiti carry in this framework?", opts:["Only a generic concept","Only a specific tool","Both a generic concept and a specific tool","Exactly the same as Schema"], ans:_A2, exp:"Graphiti means both the generic relationship-diagram concept and the getzep/graphiti tool." },
  { q:"What best describes the relationship between Graphiti and Schema?", opts:["Schema must always be drawn before Graphiti","They iterate and revise each other back and forth","They are unrelated","Graphiti is only needed after going live"], ans:_A1, exp:"They iterate, not a one-way top-down relationship." },
  { q:"What is a vector database best at answering?", opts:["Who is related to whom","Which concepts are similar","When data changed","How to implement the system"], ans:_A1, exp:"Vector databases know what's 'similar', great for similarity queries." },
  { q:"Comparing a 'data spec sheet' to designing grade-sheet columns is an analogy for which concept?", opts:["Graphiti","Schema","Open Spec","Product Goals"], ans:_A1, exp:"This is the friendly analogy for Schema." },
  { q:"Which layer is responsible for actually 'writing the code'?", opts:["Open Spec","Schema","AI Coding","Product Goals"], ans:_A2, exp:"AI Coding → Production is the implementation layer, answering 'who writes it'." }
],

m2_nav: "2. Workshop Structure Design", m2_title: "Workshop Structure Design",
m2_overview: "Translating the six-layer framework into an actually runnable workshop: 6 hours Foundations, 6 hours Implementation, teaching non-coding instructors to act as PM/PjM.",
m2_highlights: ["Foundations 6HR","Implementation 6HR","Role Shift","3HR Condensed Track"],
m2_p1: "The workshop splits into two six-hour modules. The Foundations module needs no AI tools at all, focusing on translating teaching ideas layer by layer into a clear spec while introducing essential Agile concepts. The Implementation module is where hands-on work begins, using Claude Code to turn the spec into a working prototype, and learning multi-agent collaboration and handoff-document writing. The two modules can run back to back or be scheduled independently.",
m2_p2: "Roles shift entirely: the instructor becomes both Product Manager (defining what to build) and Project Manager (arranging who does what, and when); the TA or co-instructor plays Vibe Coder, actually talking to Claude Code to produce code; Claude Code is the Implementer, turning the spec into a working product per the handoff document, delegating to multiple sub-agents in parallel when needed.",
m2_p3: "Six Foundations sessions: opening and six-layer overview, Needs→Goals, Open Spec, Graphiti+Schema, essential Agile concepts, and wrapping up into a foundation spec pack. Six Implementation sessions: Claude Code basics, Vibe Coding in action, multi-agent collaboration, handoff-document writing, a role-swap handoff exercise, and a showcase plus retrospective.",
m2_p4: "For limited time, a condensed track is also designed: 3 hours Foundations + 3 hours Implementation, still covering the full six-layer framework — suited to shorter sessions.",
m2_wrapup: "The workshop's design logic is that the course structure itself is a full demonstration of the six-layer framework — define first, then assemble, only then build — the material is proof of its own content.",
m2_terms: [
  { front:"Vibe Coding", back:"The process of actually talking to AI (Claude Code) to produce code, carried out by the TA or co-instructor" },
  { front:"PM / PjM", back:"The instructor's dual role in this workshop: Product Manager defines what, Project Manager arranges who/when" },
  { front:"Foundations Module", back:"6 hours, no AI tools needed, covers Needs/Goals/Spec/Graphiti/Schema/Agile concepts" },
  { front:"Implementation Module", back:"6 hours, hands-on with Claude Code, covers Vibe Coding/multi-agent/handoff/retrospective" },
  { front:"Condensed Track", back:"A 3+3 hour condensed version, suited to time-limited sessions" }
],
m2_q: [
  { q:"How many hours is the Foundations module, and what does it mainly teach?", opts:["6 hours, PM/PjM definition skills","6 hours, engineering/coding skills","3 hours, marketing skills","12 hours, only Claude Code operation"], ans:_A0, exp:"Foundations is 6 hours, no AI tools, focused on definition skills." },
  { q:"In the Implementation-module role mapping, what does Claude Code correspond to?", opts:["Product Manager","Vibe Coder","Implementer","Project Manager"], ans:_A2, exp:"Claude Code is the Implementer, turning specs into products per the handoff doc." },
  { q:"Why design a condensed track?", opts:["To replace the standard track entirely","To let time-limited sessions still complete all six layers","Only for advanced learners","Only covers the Vibe Coding part"], ans:_A1, exp:"The condensed track is an alternative option for limited-time sessions, not a replacement." },
  { q:"Which statement about the two modules is correct?", opts:["They must run back to back to be effective","They can run back to back or be scheduled independently","Implementation must come first","Their content is entirely duplicated"], ans:_A1, exp:"The two modules are designed to be scheduled flexibly." }

m3_nav: "3. Essential Agile / PjM Concepts", m3_title: "Essential Agile / PjM Concepts",
m3_overview: "Finishing the spec doesn't mean the project runs itself. This section maps Backlog, Kanban, Sprint, Definition of Done, Standup, Retrospective, and MVP onto the six-layer framework.",
m3_highlights: ["Backlog","Kanban","Sprint","Definition of Done","Standup","Retrospective","MVP"],
m3_p1: "A Backlog is a list of everything not yet done but already thought of, unordered, collect first. A Kanban board tracks items from the Backlog across To Do / Doing / Done — if the Doing column gets overloaded with cards, it means too much is being worked on at once, and nothing actually finishes.",
m3_p2: "A Sprint is a fixed period focused on finishing one batch of work, then reviewing and adjusting before the next round. When splitting sprints, watch task dependencies — e.g. the reporting feature must wait until the Q&A data format is fixed before it can start, not just follow sticky-note order blindly.",
m3_p3: "Definition of Done is the most easily overlooked landmine: the same phrase 'it's done' can mean completely different standards to the instructor versus the TA. Every user story should state up front 'what counts as done', instead of discovering the mismatch only after the work is finished.",
m3_p4: "A Standup isn't a status meeting — it's 3-5 minutes to quickly sync 'what I did, what's next, what's blocking me'. A Retrospective, after a round of work, uses Keep / Problem / Try to review the process, not the people. An MVP reminds the team: get something working first, then improve it, rather than chasing perfection on the first try.",
m3_wrapup: "These aren't extra knowledge — they're the operating interface that keeps a team running the six-layer framework continuously. Without a Kanban board or sprints, even a perfectly clear spec still falls into chaos.",
m3_terms: [
  { front:"Backlog", back:"A list of everything not yet done but already thought of, unordered, collected first" },
  { front:"Kanban", back:"A visual board across To Do / Doing / Done used to track work progress" },
  { front:"Sprint", back:"A fixed period focused on finishing one batch of work, reviewed and adjusted afterward" },
  { front:"Definition of Done", back:"The conditions a piece of work must meet to count as 'done', avoiding mismatched standards" },
  { front:"Standup", back:"A 3-5 minute quick sync on progress and blockers, not a detailed report" },
  { front:"Retrospective", back:"Reviewing process with Keep/Problem/Try, not reviewing people" },
  { front:"MVP", back:"Minimum Viable Product — get something working first, then improve it" }
],
m3_q: [
  { q:"What is the core spirit of a Backlog?", opts:["Only collect important items","Collect everything thought of, unordered","Must be prioritized immediately","Only the instructor can add to it"], ans:_A1, exp:"A Backlog collects everything first; prioritizing comes later." },
  { q:"What does an overloaded 'Doing' column on a Kanban board indicate?", opts:["Progress is fast","Too much in progress at once, nothing finishes","More columns are needed","The Kanban board should be scrapped"], ans:_A1, exp:"Too much work in progress means nothing actually gets finished." },
  { q:"What's most easily overlooked when splitting sprints?", opts:["Task dependencies","Sticky-note colors","Meeting times","Team size"], ans:_A0, exp:"Ignoring dependencies leads to wrong ordering and rework." },
  { q:"What problem does Definition of Done mainly solve?", opts:["Tool selection","Mismatched standards for 'done' between people","Who codes what","Whether to use AI"], ans:_A1, exp:"It unifies the standard for what counts as 'done'." },
  { q:"What is the core principle of a Retrospective?", opts:["Reviewing the person who did poorly","Reviewing the process, not the people","Only held when a project fails","Auto-generated report by AI"], ans:_A1, exp:"Retrospectives review process, not people." },
  { q:"Which statement is closest to the spirit of MVP?", opts:["Get it perfect before launch","Get something working first, then improve it","Do marketing before the product","Recruit the team before defining the spec"], ans:_A1, exp:"MVP is about working-first, then-better, not one-shot perfection." }
],

m4_nav: "4. EMI Case: Vibe Coding in Action", m4_title: "EMI Case: Vibe Coding in Action",
m4_overview: "Using Professor Shihmin Lo's EMI course, Strategic Management of Multinational Corporations (SMMC), as a real case to demonstrate handing a complete spec pack to Claude Code, deliberately contrasting a 'clear spec' against a 'vague spec'.",
m4_highlights: ["Real EMI Case","Bilingual AI TA","Clear vs Vague Spec","Definition of Done Check"],
m4_p1: "The case background: Prof. Lo's EMI students often fall behind due to full-English instruction, the instructor has no time to answer every question one by one, and the department wants to track where students get stuck. The team wrote the requirements layer by layer: 3 Needs, 3 Goals, 5 user stories (with Definition of Done), a Graphiti relationship tree, and a Schema table, forming a complete foundation spec pack.",
m4_p2: "The demo hands the complete spec pack to Claude Code and asks it to 'confirm your understanding in three to five sentences before implementing' — equivalent to a requirements review within a team, catching misunderstandings early instead of discovering the wrong direction after the work is done.",
m4_p3: "The most critical teaching device: deliberately re-running it with a 'vague' instruction — just one sentence, 'build me a course website with an AI that can answer student questions.' Comparing the two results, students see with their own eyes that bilingual support, conversation logging, and clear disclosure when unsure — all clearly specified features — completely disappear under the vague instruction.",
m4_p4: "This comparison directly answers the workshop's central question: the clarity of the spec directly determines the quality of what AI produces. After the prototype is built, each item must be checked against its Definition of Done, not waved through because it 'looks about right'.",
m4_wrapup: "Vibe Coding isn't done the moment you hand work to AI — it's using a clear spec to guide AI toward the right outcome. That is the core job of the instructor acting as PM/PjM.",
m4_terms: [
  { front:"Bilingual AI TA", back:"An AI Q&A feature that answers in Chinese or English matching the question's language — the core EMI spec" },
  { front:"Requirements Review", back:"The habit of asking Claude Code to restate its understanding before building, catching misunderstandings early" },
  { front:"Clear vs Vague Spec Comparison", back:"Running the same project with a clear spec and a vague instruction to directly compare the gap in AI output" },
  { front:"Confidence Disclosure", back:"The spec requirement that the AI TA must clearly say so, not invent answers, when a question is out of scope" },
  { front:"Vibe Coding Log", back:"A record of the actual conversation with Claude Code, including prompts used and what AI misunderstood" }
],
m4_q: [
  { q:"What core pain point does the instructor lack time to address in the EMI case?", opts:["Students don't want to attend class","Answering repetitive questions one by one","Insufficient classroom equipment","The course is too simple"], ans:_A1, exp:"The instructor lacks time to answer repetitive student questions individually." },
  { q:"What's the purpose of asking Claude Code to 'restate understanding before building'?", opts:["Wasting time","Catching misunderstandings early, before work is done in the wrong direction","Making Claude Code seem smarter","Unrelated to the six-layer framework"], ans:_A1, exp:"Equivalent to a requirements review, saving time versus fixing it after the fact." },
  { q:"After re-running with a vague instruction, which originally-specified features tend to disappear?", opts:["Colors and fonts","Bilingual support, conversation logging, confidence disclosure","Server speed","Domain name"], ans:_A1, exp:"These are features explicitly specified originally but omitted by the vague instruction." },

/* ============ FlipCardDeck ============ */
const FlipCardDeck = ({ terms, t, moduleId, onCardRead }) => {
  const [groupIdx, setGroupIdx] = useState(0);
  const [flipped, setFlipped] = useState({});
  const [readSet, setReadSet] = useState(new Set());
  const [shownSet, setShownSet] = useState(new Set());
  const [shuffledOrder] = useState(() => [...Array(terms.length).keys()].sort(() => Math.random() - 0.5));

  const groupSize = 2;
  const totalGroups = Math.ceil(terms.length / groupSize);
  const startIdx = groupIdx * groupSize;
  const currentCardIndices = shuffledOrder.slice(startIdx, startIdx + groupSize);

  useEffect(() => {
    const newShown = new Set(shownSet);
    currentCardIndices.forEach(idx => newShown.add(idx));
    if (newShown.size !== shownSet.size) setShownSet(newShown);
  }, [groupIdx]);

  const handleFlip = (origIdx) => {
    setFlipped(f => ({ ...f, [origIdx]: !f[origIdx] }));
    if (!readSet.has(origIdx)) {
      const newRead = new Set(readSet); newRead.add(origIdx); setReadSet(newRead);
      if (onCardRead) onCardRead(moduleId, newRead.size, shownSet.size, terms.length);
    }
  };

  const statusText = t.flip_status.replace('{read}', readSet.size).replace('{shown}', shownSet.size).replace('{total}', terms.length);

  return (
    <div className="mt-8">
      <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-2">{t.key_terms}</h3>
      <p className="text-sm text-slate-400 mb-4">{statusText}</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {currentCardIndices.map((origIdx) => {
          const term = terms[origIdx];
          return (
            <div key={origIdx} className="perspective cursor-pointer h-36" onClick={() => handleFlip(origIdx)}>
              <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped[origIdx] ? 'rotate-y-180' : ''}`}>
                <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
                  <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{term.front}</p>
                  <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
                </div>
                <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
                  <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{term.back}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-3 mt-4">
        <button onClick={() => { setGroupIdx(0); setFlipped({}); }}
          className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          {t.flip_retry}
        </button>
        <button onClick={() => groupIdx < totalGroups-1 && setGroupIdx(groupIdx+1)}
          disabled={groupIdx >= totalGroups-1}
          className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
          {t.flip_next}
        </button>
      </div>
    </div>
  );
};

/* ============ ModuleQuiz ============ */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit, moduleName }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState({});
  const [groupIdx, setGroupIdx] = useState(0);
  const groupSize = 2;

  const [quizIndices] = useState(() => [...Array(questions.length).keys()].sort(() => Math.random() - 0.5));
  const totalGroups = Math.ceil(quizIndices.length / groupSize);

  const [shuffledMaps] = useState(() => quizIndices.map(qIdx => {
    const n = questions[qIdx].opts.length;
    return [...Array(n).keys()].sort(() => Math.random() - 0.5);
  }));

  const totalAnswered = Object.keys(selected).length;
  const computeCorrect = () => {
    let c = 0;
    quizIndices.forEach((qIdx, qi) => {
      if (selected[qi] === undefined) return;
      if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) c++;
    });
    return c;
  };
  const statusText = t.quiz_status.replace('{correct}', computeCorrect()).replace('{answered}', totalAnswered).replace('{total}', quizIndices.length);

  const currentStart = groupIdx * groupSize;
  const currentIndices = quizIndices.slice(currentStart, currentStart + groupSize);

  const handleGroupSubmit = () => {
    const allDone = currentIndices.every((_, i) => selected[currentStart + i] !== undefined);
    if (!allDone) return;
    setSubmitted(s => ({ ...s, [groupIdx]: true }));
    if (groupIdx === totalGroups - 1 || Object.keys(submitted).length + 1 === totalGroups) {
      const wrongQs = [];
      let correct = 0;
      quizIndices.forEach((qIdx, qi) => {
        if (selected[qi] === undefined) return;
        if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) correct++;
        else wrongQs.push(questions[qIdx].q);
      });
      onQuizSubmit(moduleId, correct, quizIndices.length, wrongQs, moduleName);
    }
  };

  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-2">{t.quiz_title}</h3>
      <p className="text-sm text-slate-400 mb-6">{statusText}</p>
      {currentIndices.map((qIdx, localI) => {
        const qi = currentStart + localI;
        const q = questions[qIdx];
        const sMap = shuffledMaps[qi];
        const isGrpSub = !!submitted[groupIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">
              {sMap.map((origIdx, dIdx) => {
                const isCorrect = origIdx === _d(q.ans);
                const isSel = selected[qi] === dIdx;
                return (
                  <button key={dIdx} onClick={() => !isGrpSub && setSelected(s => ({...s, [qi]: dIdx}))}
                    className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                      ${isGrpSub
                        ? isCorrect ? 'bg-green-100 border-green-500 dark:bg-green-900/30'
                          : isSel ? 'bg-red-100 border-red-400 dark:bg-red-900/30' : 'border-slate-200 dark:border-slate-700'
                        : isSel ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                      }`}>
                    {q.opts[origIdx]}
                  </button>
                );
              })}
            </div>
            {isGrpSub && (
              <p className={`mt-2 text-sm italic ${shuffledMaps[qi][selected[qi]] === _d(q.ans) ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400'}`}>
                {shuffledMaps[qi][selected[qi]] === _d(q.ans) ? `✓ ${t.correct}` : `✗ ${t.incorrect}`} — {t.explanation}：{q.exp}
              </p>
            )}
          </div>
        );
      })}
      <div className="flex items-center gap-3">
        {!submitted[groupIdx]
          ? <button onClick={handleGroupSubmit}
              disabled={!currentIndices.every((_,i) => selected[currentStart+i] !== undefined)}
              className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
              {t.submit}
            </button>
          : <>
              {groupIdx < totalGroups-1 && (
                <button onClick={() => setGroupIdx(groupIdx+1)}
                  className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg">
                  {t.quiz_next}
                </button>
              )}
              <button onClick={() => { setGroupIdx(0); setSelected({}); setSubmitted({}); }}
                className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">
                {t.quiz_retry}
              </button>
            </>
        }
      </div>
    </div>
  );
};

/* ============ Lab 1: KanbanLab ============ */
const KANBAN_SEED = [
  { id:1, zh:"課程頁面 (S1)", en:"Course Page (S1)" },
  { id:2, zh:"雙語問答 (S2)", en:"Bilingual Q&A (S2)" },
  { id:3, zh:"對話紀錄 (S3)", en:"Conversation Log (S3)" },
  { id:4, zh:"每週報表 (S4)", en:"Weekly Report (S4)" },
  { id:5, zh:"信心不足告知 (S5)", en:"Confidence Disclosure (S5)" }
];
const KanbanLab = ({ lang }) => {
  const L = lang === 'zh'
    ? { todo:"待做", doing:"進行中", done:"已完成", hint:"點擊卡片，依序在三欄之間移動" }
    : { todo:"To Do", doing:"Doing", done:"Done", hint:"Click a card to cycle it through the columns" };
  const [cards, setCards] = useState(KANBAN_SEED.map((c,i) => ({ ...c, status: i===0?'done': i===1?'doing':'todo' })));
  const cycle = (id) => setCards(cs => cs.map(c => c.id===id
    ? { ...c, status: c.status==='todo'?'doing':c.status==='doing'?'done':'todo' } : c));
  const col = (status) => cards.filter(c => c.status===status);
  const Column = ({status,label}) => (
    <div className="flex-1 min-w-0 bg-slate-100 dark:bg-slate-900/50 rounded-xl p-3">
      <p className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">{label}</p>
      <div className="space-y-2">
        {col(status).map(c => (
          <button key={c.id} onClick={() => cycle(c.id)}
            className="w-full text-left text-sm px-3 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5]">
            {lang==='zh' ? c.zh : c.en}
          </button>
        ))}
      </div>
    </div>
  );
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <p className="text-sm text-slate-400 mb-4">{L.hint}</p>
      <div className="flex flex-col sm:flex-row gap-3">
        <Column status="todo" label={L.todo}/>
        <Column status="doing" label={L.doing}/>
        <Column status="done" label={L.done}/>
      </div>
    </div>
  );
};

/* ============ Constants ============ */
const NUM_LEARN = 6;
const TOTAL = 1 + NUM_LEARN + 3;
const IDX_LAB = NUM_LEARN + 1;
const IDX_RES = NUM_LEARN + 2;
const IDX_ANA = NUM_LEARN + 3;
const MODULE_ICONS = ['📋','🏛️','🎯','🔄','🧪','🤖','🤝','🧫','🌐','📊'];

function moduleNavTitle(t, id){
  if (id===0) return t.m0_nav;
  if (id>=1 && id<=NUM_LEARN) return t[`m${id}_nav`];
  if (id===IDX_LAB) return t.mlab_nav;
  if (id===IDX_RES) return t.mres_nav;
  return t.analytics_title;
}
function moduleShortTitle(t, id){
  if (id===0) return t.m0_title;
  if (id>=1 && id<=NUM_LEARN) return t[`m${id}_title`];
  if (id===IDX_LAB) return t.mlab_title;
  if (id===IDX_RES) return t.mres_title;
  return t.analytics_title;
}

/* ============ App ============ */
function App() {
  const LS_KEY = 'ASW_SPA_analytics';
  const LS_STU = 'ASW_SPA_student';
  const loadLS = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };

  const [lang, setLang] = useState('en');
  const [isDark, setIsDark] = useState(true);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [toastMsg, setToastMsg] = useState('');
  const [studentInfo, setStudentInfo] = useState(() => loadLS(LS_STU, { group:'', dept:'', id:'', nameEn:'', nameZh:'' }));
  const [analytics, setAnalytics] = useState(() => loadLS(LS_KEY, {
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0),
    cardsRead: Array(TOTAL).fill(0), cardsTotal: Array(TOTAL).fill(0),
    wrongTopics: {}
  }));
  const menuRef = useRef(null);
  const startRef = useRef(Date.now());
  const t = dict[lang];

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(analytics)); } catch {} }, [analytics]);
  useEffect(() => { try { localStorage.setItem(LS_STU, JSON.stringify(studentInfo)); } catch {} }, [studentInfo]);
  useEffect(() => { _toastFn = () => { setToastMsg(t.copyright_toast); setTimeout(() => setToastMsg(''), 2000); }; }, [lang]);
  useEffect(() => {
    const onClickOutside = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', onClickOutside);
    return () => document.removeEventListener('mousedown', onClickOutside);
  }, []);
  useEffect(() => {
    startRef.current = Date.now();
    return () => {
      const elapsed = Math.round((Date.now() - startRef.current) / 1000);
      if (elapsed > 0) setAnalytics(a => { const time=[...a.time]; time[module]=(time[module]||0)+elapsed; return {...a, time}; });
    };
  }, [module]);

  const handleQuizSubmit = (mid, correct, total, wrongQs, moduleName) => {
    setAnalytics(a => {
      const qc=[...a.quizCorrect], qt=[...a.quizTotal];
      qc[mid]=correct; qt[mid]=total;
      const wt={...a.wrongTopics}; wt[mid]=wrongQs||[];
      return {...a, quizCorrect:qc, quizTotal:qt, wrongTopics:wt};
    });
  };
  const handleCardRead = (mid, readCount, shownCount, totalCount) => {
    setAnalytics(a => {
      const cr=[...a.cardsRead], ct=[...a.cardsTotal];
      cr[mid]=readCount; ct[mid]=totalCount;
      return {...a, cardsRead:cr, cardsTotal:ct};
    });
  };
  const handleContentClick = () => setAnalytics(a => { const clicks=[...a.clicks]; clicks[module]=(clicks[module]||0)+1; return {...a, clicks}; });

  const goTo = (id) => { setModule(id); setMenuOpen(false); window.scrollTo({top:0, behavior:'smooth'}); };

  const clearHistory = () => {
    if (!window.confirm(t.analytics_wp_clear_confirm)) return;
    const fresh = { time:Array(TOTAL).fill(0), clicks:Array(TOTAL).fill(0), quizCorrect:Array(TOTAL).fill(0), quizTotal:Array(TOTAL).fill(0), cardsRead:Array(TOTAL).fill(0), cardsTotal:Array(TOTAL).fill(0), wrongTopics:{} };
    setAnalytics(fresh);
    try { localStorage.setItem(LS_KEY, JSON.stringify(fresh)); } catch {}
  };

  const exportCSV = () => {
    const rows = [['Module','Time(sec)','Clicks','Quiz Correct','Quiz Total','Cards Read','Cards Total','Wrong Questions'].join(',')];
    for (let i=0;i<TOTAL;i++){
      const wrong = (analytics.wrongTopics[i]||[]).join(' | ').replace(/"/g,"'");
      rows.push([`"${moduleShortTitle(dict.en,i).replace(/"/g,"'")}"`, analytics.time[i]||0, analytics.clicks[i]||0,
        analytics.quizCorrect[i]||0, analytics.quizTotal[i]||0, analytics.cardsRead[i]||0, analytics.cardsTotal[i]||0, `"${wrong}"`].join(','));
    }
    const csv = '﻿' + rows.join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const fname = `${dict.zh.brand}${dict.zh.title}_${sanitizeName(studentInfo.nameEn||studentInfo.nameZh||'anon')}_${dateStr}.csv`;
    a.href = url; a.download = fname; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const formFilled = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.nameEn && studentInfo.nameZh;

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { speechSynthesis.resume(); setTtsState('playing'); return; }
      speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) {
        texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc,
          ...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),
          ...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)];
      } else if (module >= 1 && module <= NUM_LEARN) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`], t[`${mk}_overview`], ...(t[`${mk}_highlights`]||[]),
          t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`], t[`${mk}_p4`],
          t[`${mk}_wrapup`], ...(t[`${mk}_terms`]||[]).flatMap(c=>[c.front, c.back])];
      } else if (module === IDX_LAB) {
        texts = [t.mlab_title, t.mlab_desc, ...(t.mlab_labs||[]).map(l=>`${l.title}. ${l.desc||''}`)];
      } else if (module === IDX_RES) {
        texts = [t.mres_title, t.mres_desc];
      } else if (module === IDX_ANA) {
        const tc = analytics.quizCorrect.reduce((a,b)=>a+b,0);
        const ta = analytics.quizTotal.reduce((a,b)=>a+b,0);
        const oa = ta>0 ? Math.round(tc/ta*100) : 0;
        const wk = [];
        for (let i=1;i<=NUM_LEARN;i++){
          if (analytics.quizTotal[i]>0){
            const a2 = Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100);
            if (a2<75) wk.push({name:moduleShortTitle(t,i), acc:a2});
          }
        }
        wk.sort((a,b)=>a.acc-b.acc);
        texts = [t.analytics_title, t.analytics_desc,
          `${t.analytics_total_time}: ${analytics.time.reduce((a,b)=>a+b,0)}${t.analytics_sec}`,
          `${t.analytics_total_clicks}: ${analytics.clicks.reduce((a,b)=>a+b,0)}${t.analytics_times}`,
          `${t.analytics_overall_acc}: ${oa}%`];
        if (wk.length) { texts.push(t.analytics_wp_tts_intro); wk.forEach(w=>texts.push(t.analytics_wp_tts_module.replace('{name}',w.name).replace('{acc}',w.acc))); }
        else if (ta>0) texts.push(t.analytics_wp_tts_allpass);
      }
      texts = texts.filter(Boolean);
      const utt = new SpeechSynthesisUtterance(texts.join(sep));
      utt.rate = 0.95;
      const voices = speechSynthesis.getVoices();
      if (lang==='zh') {
        const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating')) || voices.find(v=>v.lang==='zh-TW') || voices.find(v=>v.lang.startsWith('zh'));
        if (v) utt.voice = v; utt.lang = 'zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel'))) || voices.find(v=>v.lang==='en-GB') || voices.find(v=>v.lang.startsWith('en'));
        if (v) utt.voice = v; utt.lang = 'en-GB';
      }
      utt.onend = () => setTtsState('idle');
      utt.onerror = () => setTtsState('idle');
      speechSynthesis.speak(utt);
      setTtsState('playing');
    }
  };

  const menuList = Array.from({length:TOTAL}, (_,i) => i);
  const totalTime = analytics.time.reduce((a,b)=>a+b,0);
  const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
  const tCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
  const tTotal = analytics.quizTotal.reduce((a,b)=>a+b,0);
  const overallAcc = tTotal>0 ? Math.round(tCorrect/tTotal*100) : 0;
  const tCardsRead = analytics.cardsRead.reduce((a,b)=>a+b,0);
  const tCardsTotal = analytics.cardsTotal.reduce((a,b)=>a+b,0);
  const cardUsage = tCardsTotal>0 ? Math.round(tCardsRead/tCardsTotal*100) : 0;

  return (
    <div className="min-h-screen flex flex-col font-sans">
      {toastMsg && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white text-sm px-4 py-2 rounded-lg shadow-xl">

      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">

                  {menuList.map(id => (
                    <button key={id} onClick={() => goTo(id)}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm text-left hover:bg-slate-100 dark:hover:bg-slate-700 ${module===id ? 'bg-[#004030]/10 dark:bg-[#D8C3A5]/10 font-bold' : ''}`}>
                      <span>{MODULE_ICONS[id]}</span><span className="truncate">{moduleNavTitle(t, id)}</span>

      </header>

      <div className="flex-1 flex pt-16 max-w-7xl mx-auto w-full">
        <aside className="hidden md:block w-64 shrink-0 border-r border-slate-200 dark:border-slate-700 p-4 sticky top-16 self-start max-h-[calc(100vh-4rem)] overflow-y-auto">
          <p className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">{t.nav_modules}</p>
          <div className="space-y-1">
            {menuList.map(id => (
              <button key={id} onClick={() => goTo(id)}
                className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left ${module===id ? 'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                <span>{MODULE_ICONS[id]}</span><span className="truncate">{moduleNavTitle(t, id)}</span>
              </button>
            ))}
          </div>
        </aside>

        <main className="flex-1 min-w-0 px-4 sm:px-6 md:px-10 py-8" onClick={handleContentClick}>
          {module === 0 && (
            <div className="animate-fade-in">
              <div className="bg-gradient-to-br from-[#004030] to-[#00291f] dark:from-slate-900 dark:to-slate-800 text-white rounded-2xl p-8 md:p-12 mb-8">
                <p className="text-[#D8C3A5] font-bold text-sm uppercase tracking-widest mb-3">{t.subtitle}</p>
                <h1 className="text-3xl md:text-5xl font-serif font-black mb-4">{t.m0_title}</h1>
                <p className="text-slate-200 leading-relaxed max-w-3xl">{t.m0_intro}</p>
                <button onClick={() => goTo(1)} className="mt-6 px-6 py-3 bg-[#D8C3A5] text-[#004030] font-bold rounded-lg hover:opacity-90">{t.m0_start}</button>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                {t.m0_stats.map((s,i) => (
                  <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
                    <p className="text-2xl font-black text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
                    <p className="text-xs text-slate-500 mt-1">{s.label}</p>
                  </div>
                ))}
              </div>
              <div className="bg-slate-100 dark:bg-slate-800 rounded-xl p-6 mb-8">
                <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-2">{t.m0_why}</h3>
                <p className="text-slate-600 dark:text-slate-300">{t.m0_why_desc}</p>
              </div>
              <div className="grid sm:grid-cols-2 gap-4">
                {t.m0_modules.map((m,i) => (
                  <button key={i} onClick={() => goTo(i+1)} className="text-left bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group">
                    <span className="text-xs font-mono text-[#D8C3A5]">{m.num}</span>
                    <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] group-hover:underline">{m.title}</h4>
                    <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">{m.desc}</p>
                  </button>
                ))}
              </div>
            </div>
          )}

          {module >= 1 && module <= NUM_LEARN && (
            <LearnModule module={module} t={t} analytics={analytics} handleCardRead={handleCardRead} handleQuizSubmit={handleQuizSubmit} />
          )}

          {module === IDX_LAB && (
            <div className="animate-fade-in space-y-8">
              <H2 icon={MODULE_ICONS[IDX_LAB]} number={NUM_LEARN+1}>{t.mlab_title}</H2>
              <p className="text-slate-600 dark:text-slate-300">{t.mlab_desc}</p>
              <div>
                <h3 className="font-serif font-bold text-lg mb-3 text-[#004030] dark:text-[#D8C3A5]">{t.mlab_labs[0].title}</h3>
                <p className="text-sm text-slate-500 mb-3">{t.mlab_labs[0].desc}</p>
                <KanbanLab lang={lang} />
              </div>
              <div>
                <h3 className="font-serif font-bold text-lg mb-3 text-[#004030] dark:text-[#D8C3A5]">{t.mlab_labs[1].title}</h3>
                <p className="text-sm text-slate-500 mb-3">{t.mlab_labs[1].desc}</p>
                <SpecClarityLab lang={lang} />
              </div>
              <div>
                <h3 className="font-serif font-bold text-lg mb-3 text-[#004030] dark:text-[#D8C3A5]">{t.mlab_labs[2].title}</h3>
                <p className="text-sm text-slate-500 mb-3">{t.mlab_labs[2].desc}</p>
                <DependencyLab lang={lang} />
              </div>
              <div>
                <h3 className="font-serif font-bold text-lg mb-3 text-[#004030] dark:text-[#D8C3A5]">{t.mlab_labs[3].title}</h3>
                <p className="text-sm text-slate-500 mb-3">{t.mlab_labs[3].desc}</p>
                <ConfidenceSelfAssessLab lang={lang} />
              </div>
            </div>
          )}

          {module === IDX_RES && (
            <div className="animate-fade-in space-y-4">
              <H2 icon={MODULE_ICONS[IDX_RES]} number={NUM_LEARN+2}>{t.mres_title}</H2>
              <p className="text-slate-600 dark:text-slate-300 mb-4">{t.mres_desc}</p>
              <div className="grid sm:grid-cols-2 gap-4">
                <LinkCard label="工作坊行銷簡報 Marketing Deck" url="工作坊行銷簡報.html" desc={lang==='zh' ? "13頁動畫簡報，含雙語語音導覽" : "13-slide animated deck with bilingual narration"} />
                <LinkCard label="交接文件範本 Handoff Template" url="交接文件範本_AI-native專案.md" desc={lang==='zh' ? "可直接複製使用的空白交接文件" : "A reusable blank handoff document template"} />
                <LinkCard label="AI-native 知識庫 Knowledge Base" url="AI-native開發流程_KnowledgeBase.md" desc={lang==='zh' ? "六層架構完整概念文件" : "The full six-layer concept document"} />
                <LinkCard label="Prof. Shihmin Lo — NCNU" url="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" desc={lang==='zh' ? "駱世民教授 NCNU 教師頁面" : "Faculty page at NCNU"} />
                <LinkCard label="getzep/graphiti (GitHub)" url="https://github.com/getzep/graphiti" desc={lang==='zh' ? "Graphiti 開源知識圖譜專案" : "The open-source Graphiti knowledge-graph project"} />
              </div>
            </div>
          )}

          {module === IDX_ANA && (
            <div className="animate-fade-in space-y-6">
              <H2 icon={MODULE_ICONS[IDX_ANA]} number={NUM_LEARN+3}>{t.analytics_title}</H2>
              <p className="text-slate-600 dark:text-slate-300">{t.analytics_desc}</p>
              <p className="text-xs text-green-600 dark:text-green-400">💾 {t.analytics_wp_saved}</p>

              <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
                <h3 className="font-bold mb-4">{t.analytics_form_title}</h3>
                <div className="grid sm:grid-cols-2 gap-4">
                  <div>
                    <label className="text-xs text-slate-500">{t.analytics_group}</label>
                    <select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))}
                      className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent">
                      <option value="">{t.analytics_group_select}</option>
                      {t.group_options.map(g => <option key={g} value={g}>{g}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">{t.analytics_dept}</label>
                    <input value={studentInfo.dept} placeholder={t.analytics_dept_ph} onChange={e=>setStudentInfo(s=>({...s,dept:sanitizeName(e.target.value)}))}
                      className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent"/>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">{t.analytics_id}</label>
                    <input value={studentInfo.id} placeholder={t.analytics_id_ph} onChange={e=>setStudentInfo(s=>({...s,id:sanitizeStudentId(e.target.value)}))}
                      className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent"/>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">{t.analytics_name_en}</label>
                    <input value={studentInfo.nameEn} placeholder={t.analytics_name_en_ph} onChange={e=>setStudentInfo(s=>({...s,nameEn:sanitizeName(e.target.value)}))}
                      className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent"/>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">{t.analytics_name_zh}</label>
                    <input value={studentInfo.nameZh} placeholder={t.analytics_name_zh_ph} onChange={e=>setStudentInfo(s=>({...s,nameZh:sanitizeName(e.target.value)}))}
                      className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-transparent"/>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
                  <IconActivity className="mx-auto mb-1 text-[#004030] dark:text-[#D8C3A5]"/>
                  <p className="text-xl font-black">{totalTime}{t.analytics_sec}</p><p className="text-xs text-slate-500">{t.analytics_total_time}</p>
                </div>
                <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
                  <IconZap className="mx-auto mb-1 text-[#004030] dark:text-[#D8C3A5]"/>
                  <p className="text-xl font-black">{totalClicks}{t.analytics_times}</p><p className="text-xs text-slate-500">{t.analytics_total_clicks}</p>
                </div>
                <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
                  <IconCheckCircle className="mx-auto mb-1 text-[#004030] dark:text-[#D8C3A5]"/>
                  <p className="text-xl font-black">{overallAcc}%</p><p className="text-xs text-slate-500">{t.analytics_overall_acc}</p>
                </div>
                <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
                  <IconLayers className="mx-auto mb-1 text-[#004030] dark:text-[#D8C3A5]"/>
                  <p className="text-xl font-black">{cardUsage}%</p><p className="text-xs text-slate-500">{t.analytics_card_usage}</p>
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
                <h3 className="font-bold mb-4">{t.analytics_progress_title}</h3>
                <div className="space-y-2">
                  {Array.from({length:NUM_LEARN},(_,i)=>i+1).map(id => {
                    const visited = (analytics.time[id]||0) > 0;
                    const quizDone = (analytics.quizTotal[id]||0) > 0;
                    const pct = quizDone ? Math.round(analytics.quizCorrect[id]/analytics.quizTotal[id]*100) : (visited?50:0);
                    return (
                      <button key={id} onClick={()=>goTo(id)} className="w-full text-left">
                        <div className="flex justify-between text-xs mb-1">
                          <span>{MODULE_ICONS[id]} {moduleShortTitle(t,id)}</span>
                          <span>{quizDone ? t.analytics_progress_quiz_done : visited ? t.analytics_progress_visited : t.analytics_progress_not_visited}</span>
                        </div>
                        <div className="h-2 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                          <div className="h-full bg-[#004030] dark:bg-[#D8C3A5]" style={{width:`${pct}%`}}></div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
                <h3 className="font-bold mb-4">{t.analytics_wp_title}</h3>
                {(() => {
                  const weak = [];
                  for (let i=1;i<=NUM_LEARN;i++){
                    if ((analytics.quizTotal[i]||0)>0){
                      const acc = Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100);
                      if (acc<75) weak.push({id:i, acc});
                    }
                  }
                  weak.sort((a,b)=>a.acc-b.acc);
                  if (weak.length===0) return <p className="text-sm text-green-600 dark:text-green-400">{tTotal>0 ? t.analytics_wp_allpass : t.analytics_no_data}</p>;
                  return weak.map(w => (
                    <div key={w.id} className="text-sm mb-3 pb-3 border-b border-slate-100 dark:border-slate-700 last:border-0">
                      <p className="font-bold">{moduleShortTitle(t,w.id)} — {w.acc}%</p>
                      {(analytics.wrongTopics[w.id]||[]).length > 0 && (
                        <p className="text-slate-500 text-xs mt-1">{t.analytics_wp_incorrect} {(analytics.wrongTopics[w.id]||[]).join('；')}</p>
                      )}
                      <button onClick={()=>goTo(w.id)} className="text-xs text-[#004030] dark:text-[#D8C3A5] underline mt-1">{t.analytics_wp_goto}</button>
                    </div>
                  ));
                })()}
              </div>

              <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700 overflow-x-auto">
                <table className="w-full text-sm min-w-[600px]">
                  <thead><tr className="text-left text-slate-400 border-b border-slate-200 dark:border-slate-700">
                    <th className="py-2 pr-4">{t.analytics_module}</th><th className="py-2 pr-4">{t.analytics_time}</th>
                    <th className="py-2 pr-4">{t.analytics_clicks}</th><th className="py-2 pr-4">{t.analytics_correct_ans_total}</th>
                    <th className="py-2 pr-4">{t.analytics_cards_read_total}</th>
                  </tr></thead>
                  <tbody>
                    {Array.from({length:NUM_LEARN},(_,i)=>i+1).map(id => (
                      <tr key={id} className="border-b border-slate-100 dark:border-slate-800">
                        <td className="py-2 pr-4">{MODULE_ICONS[id]} {moduleShortTitle(t,id)}</td>
                        <td className="py-2 pr-4">{analytics.time[id]||0}{t.analytics_sec}</td>
                        <td className="py-2 pr-4">{analytics.clicks[id]||0}</td>
                        <td className="py-2 pr-4">{analytics.quizTotal[id] ? `${analytics.quizCorrect[id]}/${analytics.quizTotal[id]}` : t.analytics_no_data}</td>
                        <td className="py-2 pr-4">{analytics.cardsTotal[id] ? `${analytics.cardsRead[id]}/${analytics.cardsTotal[id]}` : '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="flex flex-wrap gap-3">
                <button onClick={exportCSV} disabled={!formFilled}
                  className="px-5 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
                  {t.analytics_export_csv}
                </button>
                {!formFilled && <p className="text-xs text-red-500 self-center">{t.analytics_fill_required}</p>}
                <button onClick={clearHistory} className="px-5 py-2.5 border border-red-400 text-red-500 font-bold rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20">
                  {t.analytics_wp_clear}
                </button>
              </div>
            </div>
          )}

          <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
            <button onClick={() => module>0 && goTo(module-1)} disabled={module===0}
              className="px-4 py-2 text-sm font-bold border border-slate-300 dark:border-slate-600 rounded-lg disabled:opacity-0 flex items-center gap-1">
              ← {t.nav_prev}
            </button>
            <button onClick={() => module<TOTAL-1 && goTo(module+1)} disabled={module===TOTAL-1}
              className="px-4 py-2 text-sm font-bold bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg disabled:opacity-0 flex items-center gap-1">
              {t.nav_next} →
            </button>
          </div>
        </main>
      </div>

      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span>{t.architect_label}&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline">{t.architect_name}</a></span>
          <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white font-bold">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
